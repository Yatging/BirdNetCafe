<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WingedIn · 翎英 | Linking Features and Future.</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="glass-nav">
    <div class="logo">
      <span class="icon">🌳</span>
      <span class="title">WingedIn · 翎英</span>
      <span class="badge">Linking Features and Future.</span>
    </div>
    <div class="controls">
      <button id="resetBtn" class="btn-outline">🧹 重置数据</button>
      <button id="createTreeBtn" class="btn-primary">✨ 创建我的树</button>
      <button id="enableAudioBtn" class="btn-outline">🔊 启用音频</button>
    </div>
  </header>

  <div class="main-content">
    <aside class="left-sidebar">
      <div id="map" class="map-container"></div>
      <div class="tree-list-header">
        <h3>📍 已标记的榕树</h3>
      </div>
      <ul id="treeList" class="tree-list"></ul>
    </aside>

    <main class="tree-view">
      <div id="tree-container" class="tree-container">
        </div>
    </main>

    <aside class="right-sidebar">
      <div class="right-sidebar-header">🐦 树上的鸟类</div>
      <ul id="species-list" class="species-list"></ul>
    </aside>
  </div>

  <div id="createTreeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🌱 创建你的榕树</h2>
        <button class="close-modal" onclick="document.getElementById('createTreeModal').style.display='none'">&times;</button>
      </div>
      <div class="modal-body">
        <label>树的名字：<input type="text" id="newTreeName" placeholder="例如：大窩坪道榕樹"></label>
        <label>选择位置 (点击地图)：
          <input type="text" id="newTreeCoords" placeholder="点击下方地图选取" readonly>
          <div id="modal-map-container" style="height: 200px; margin-top: 8px; border-radius: 8px;"></div>
        </label>
        <label>上传 BirdNET CSV：<input type="file" id="newTreeCSV" accept=".csv"></label>
        <label>上传鸟鸣音频 (多选)：<input type="file" id="newTreeAudio" accept="audio/*" multiple></label>
        <button id="confirmCreateTree" class="btn-primary">确认创建</button>
      </div>
    </div>
  </div>

  <div id="toast-root"></div>
  <div id="popup-root"></div>
</div>

<footer id="about-section" class="about-footer">
  <div class="about-container">
    <div class="about-text">
      <h2>关于 BirdNetCafe · 翎英</h2>
      <p>致力于将声学生态数据可视化的开源项目。让城市中那些常被忽视的鸟鸣重新被人们“看见”与“听见”。</p>
    </div>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>

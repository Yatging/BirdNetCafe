<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>榕树声景 · 科普展项</title>
  <link rel="stylesheet" href="./style.css" type="text/css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">
        <h1>榕树声景</h1>
        <p>探索树叶下的鸟鸣 · 科学公民项目</p>
      </div>
      <div class="toolbar">
        <label class="btn secondary">
          📁 导入 BirdNET
          <input type="file" id="birdnetFile" accept=".csv" />
        </label>
        <label class="btn secondary">
          📁 导入 AFCD 名录
          <input type="file" id="afcdFile" accept=".csv" />
        </label>
        <label class="btn secondary">
          🎵 上传音频
          <input type="file" id="audioFile" accept="audio/*" multiple />
        </label>
        <button id="enableAudioBtn" class="btn primary">🔊 启用音频</button>
        <button id="resetBtn" class="btn secondary">🔄 重置</button>
      </div>
    </header>

    <main>
      <div id="canvas-container"></div>
    </main>

    <div id="popup-root"></div>
    <div id="toast-root"></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
